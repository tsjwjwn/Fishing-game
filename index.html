<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Câu Cá Vạn Cân</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: Arial, sans-serif; touch-action: manipulation; }
        canvas { display: block; background: #1E90FF; margin: 0 auto; }
        #ui, #shop { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        #shop { display: none; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                background: rgba(0,0,0,0.8); padding: 20px; text-align: center; pointer-events: all; border-radius: 10px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div id="ui">
        Điểm: <span id="score">0</span> | Cao nhất: <span id="highScore">0</span><br>
        Thời gian: <span id="timer">60</span>s | Thuốc nổ: <span id="tntCount">0</span>
    </div>

    <div id="shop">
        <h2>CỬA HÀNG</h2>
        <p>Bạn có <span id="shopScore">0</span> điểm</p>
        <button onclick="buyItem('strength')">Tăng sức kéo (50đ)</button><br>
        <button onclick="buyItem('tnt')">Mua Thuốc nổ (30đ)</button><br>
        <button onclick="buyItem('time')">Thêm 10 giây (40đ)</button><br>
        <button onclick="nextLevel()" style="background: #4CAF50; color: white;">BẮT ĐẦU MÀN TIẾP THEO</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
// ĐĂNG KÝ SERVICE WORKER (PWA)
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => console.log('SW registered!'));
    });
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// BIẾN GAME
let score = 0;
let highScore = localStorage.getItem('fishGameHighScore') || 0;
let timeLeft = 60;
let gameState = 'PLAY'; // PLAY, SHOP, RETRACTING, EXTENDING
let tntCount = 0;
let strengthMult = 1;

// MÓC CÂU
const hook = {
    x: canvas.width / 2,
    y: 100,
    angle: 0,
    dir: 1,
    len: 50,
    baseLen: 50,
    speed: 5,
    state: 'SWING' // SWING, SHOOT, RETRACT
};

// VẬT THỂ
let objects = [];
const types = [
    { name: 'Cá vàng', weight: 10, size: 20, color: 'gold', speed: 2 },
    { name: 'Cá mập', weight: 50, size: 50, color: 'gray', speed: 1 },
    { name: 'Đá', weight: 100, size: 40, color: '#555', speed: 0.5 }
];

function spawnObjects() {
    objects = [];
    for(let i=0; i<8; i++) {
        objects.push({
            x: Math.random() * (canvas.width - 100) + 50,
            y: Math.random() * (canvas.height - 300) + 250,
            type: types[Math.floor(Math.random() * types.length)],
            dir: Math.random() > 0.5 ? 1 : -1
        });
    }
}

// LOGIC CẬP NHẬT
function update() {
    if (gameState !== 'PLAY') return;

    // Thời gian
    timeLeft -= 1/60;
    if (timeLeft <= 0) endGame();

    // Móc câu dao động
    if (hook.state === 'SWING') {
        hook.angle += 0.03 * hook.dir;
        if (Math.abs(hook.angle) > Math.PI/3) hook.dir *= -1;
    } 
    else if (hook.state === 'SHOOT') {
        hook.len += hook.speed;
        if (hook.len > canvas.height || hook.x + Math.sin(hook.angle)*hook.len < 0 || hook.x + Math.sin(hook.angle)*hook.len > canvas.width) {
            hook.state = 'RETRACT';
        }
        // Kiểm tra va chạm
        let hX = hook.x + Math.sin(hook.angle) * hook.len;
        let hY = hook.y + Math.cos(hook.angle) * hook.len;
        
        objects.forEach((obj, index) => {
            let dist = Math.hypot(hX - obj.x, hY - obj.y);
            if (dist < obj.type.size) {
                hook.caught = obj;
                objects.splice(index, 1);
                hook.state = 'RETRACT';
            }
        });
    } 
    else if (hook.state === 'RETRACT') {
        let weightFactor = hook.caught ? (20 / hook.caught.type.weight) * strengthMult : 5;
        hook.len -= Math.max(1, weightFactor);
        
        if (hook.len <= hook.baseLen) {
            if (hook.caught) {
                score += hook.caught.type.weight;
                hook.caught = null;
            }
            hook.len = hook.baseLen;
            hook.state = 'SWING';
        }
    }

    // Di chuyển cá
    objects.forEach(obj => {
        obj.x += obj.type.speed * obj.dir;
        if (obj.x < 0 || obj.x > canvas.width) obj.dir *= -1;
    });

    draw();
    updateUI();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Vẽ dây câu
    ctx.beginPath();
    ctx.moveTo(hook.x, hook.y);
    let hX = hook.x + Math.sin(hook.angle) * hook.len;
    let hY = hook.y + Math.cos(hook.angle) * hook.len;
    ctx.lineTo(hX, hY);
    ctx.stroke();

    // Vẽ móc câu
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(hX, hY, 5, 0, Math.PI*2);
    ctx.fill();

    // Vẽ cá
    objects.forEach(obj => {
        ctx.fillStyle = obj.type.color;
        ctx.beginPath();
        ctx.arc(obj.x, obj.y, obj.type.size, 0, Math.PI*2);
        ctx.fill();
    });

    // Vẽ cá đang bị kéo
    if (hook.caught) {
        ctx.fillStyle = hook.caught.type.color;
        ctx.beginPath();
        ctx.arc(hX, hY + 10, hook.caught.type.size, 0, Math.PI*2);
        ctx.fill();
    }
}

function updateUI() {
    document.getElementById('score').innerText = score;
    document.getElementById('timer').innerText = Math.ceil(timeLeft);
    document.getElementById('tntCount').innerText = tntCount;
    document.getElementById('highScore').innerText = highScore;
}

// XỬ LÝ SỰ KIỆN
window.addEventListener('mousedown', (e) => {
    if (gameState !== 'PLAY') return;
    if (hook.state === 'SWING') hook.state = 'SHOOT';
    else if (hook.state === 'RETRACT' && hook.caught && tntCount > 0) {
        // Sử dụng thuốc nổ phá đá
        tntCount--;
        hook.caught = null;
    }
});

function endGame() {
    gameState = 'SHOP';
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('fishGameHighScore', highScore);
    }
    document.getElementById('shop').style.display = 'block';
    document.getElementById('shopScore').innerText = score;
}

// CỬA HÀNG
function buyItem(item) {
    if (item === 'strength' && score >= 50) {
        score -= 50; strengthMult += 0.5;
    } else if (item === 'tnt' && score >= 30) {
        score -= 30; tntCount++;
    } else if (item === 'time' && score >= 40) {
        score -= 40; timeLeft += 10;
    }
    updateUI();
    document.getElementById('shopScore').innerText = score;
}

function nextLevel() {
    document.getElementById('shop').style.display = 'none';
    timeLeft = 60;
    spawnObjects();
    gameState = 'PLAY';
    update();
}

spawnObjects();
update();
</script>
</body>
</html>
